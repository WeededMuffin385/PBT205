services:
  database:
    image: postgres:18
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
  backend:
    build:
      context: .
      dockerfile: docker/backend.dockerfile
      args:
        TARGET: ${TARGET}
        PROFILE: ${PROFILE}
    environment:
      RUST_LOG: info,tower_http=trace
    ports:
      - "8080:8080"
    volumes:
      - ./assets:/assets

volumes:
  pgdata: